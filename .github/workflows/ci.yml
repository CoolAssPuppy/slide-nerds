name: Package tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  runtime-cli-security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build --workspace=packages/runtime --workspace=packages/cli

      - name: Run tests
        run: npm test

      - name: TypeScript check
        run: npm run typecheck
